<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TeamPro 智慧運動團隊管理系統</title>
<style>
/* ==================================================
   全域變數 / 視覺主題（深藍 × 亮藍 × 白 × 綠）
   ================================================== */
:root{
  --navy:#0d1b3e;
  --navy2:#13235a;
  --blue:#2563eb;
  --blue-light:#3b82f6;
  --cyan:#22d3ee;
  --green:#16a34a;
  --green-light:#22c55e;
  --yellow:#f59e0b;
  --red:#dc2626;
  --bg:#0a1228;
  --card:#ffffff;
  --card-soft:#f1f5fb;
  --text:#0f172a;
  --muted:#64748b;
  --line:#e2e8f0;
  --shadow:0 6px 20px rgba(13,27,62,.12);
  --radius:16px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:"Segoe UI","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
  background:linear-gradient(160deg,#0a1228,#13235a 60%,#0d1b3e);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.app{max-width:520px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:80px;}
.hidden{display:none !important;}

/* 按鈕 */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:16px;border:none;border-radius:14px;
  font-size:17px;font-weight:700;cursor:pointer;transition:.15s;
  background:var(--blue);color:#fff;box-shadow:0 4px 14px rgba(37,99,235,.4);
}
.btn:active{transform:scale(.97);}
.btn.green{background:var(--green);box-shadow:0 4px 14px rgba(22,163,74,.4);}
.btn.ghost{background:rgba(255,255,255,.12);color:#fff;box-shadow:none;border:1px solid rgba(255,255,255,.25);}
.btn.outline{background:#fff;color:var(--blue);border:2px solid var(--blue);box-shadow:none;}
.btn.sm{width:auto;padding:9px 16px;font-size:14px;border-radius:10px;}
.btn.gray{background:#475569;}
.btn.danger{background:var(--red);}
.btn-row{display:flex;gap:10px;}
.btn-row .btn{margin:0;}

/* 表單 */
label.fld{display:block;margin:14px 0 6px;font-weight:600;font-size:14px;color:var(--navy);}
input,select,textarea{
  width:100%;padding:13px;border:1.5px solid var(--line);border-radius:12px;
  font-size:16px;font-family:inherit;background:#fff;color:var(--text);
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);}
textarea{min-height:70px;resize:vertical;}

/* 卡片 */
.card{background:var(--card);border-radius:var(--radius);padding:18px;margin:14px;box-shadow:var(--shadow);}
.section-title{color:#fff;font-size:15px;font-weight:800;margin:22px 14px 8px;display:flex;align-items:center;gap:8px;letter-spacing:.5px;}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;}
.tag.green{background:#dcfce7;color:#166534;}
.tag.yellow{background:#fef3c7;color:#92400e;}
.tag.red{background:#fee2e2;color:#991b1b;}
.tag.blue{background:#dbeafe;color:#1e40af;}
.tag.gray{background:#e2e8f0;color:#475569;}

/* 頂部 header */
.topbar{
  position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;background:rgba(13,27,62,.92);backdrop-filter:blur(8px);color:#fff;
}
.topbar h1{font-size:17px;margin:0;font-weight:800;}
.topbar .sub{font-size:12px;color:#9db4e8;}

/* 底部導覽 */
.bottomnav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;
  display:flex;background:rgba(13,27,62,.97);backdrop-filter:blur(8px);
  border-top:1px solid rgba(255,255,255,.1);z-index:40;
}
.bottomnav button{
  flex:1;background:none;border:none;color:#8aa0d0;padding:10px 4px;font-size:11px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;font-weight:600;
}
.bottomnav button.active{color:var(--cyan);}
.bottomnav button .ic{font-size:20px;}

/* 功能格 */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.feat{
  background:#fff;border-radius:14px;padding:14px 12px;text-align:left;cursor:pointer;
  border:1.5px solid var(--line);transition:.15s;position:relative;min-height:88px;
  display:flex;flex-direction:column;gap:4px;
}
.feat:active{transform:scale(.97);}
.feat .fi{font-size:24px;}
.feat .fn{font-weight:700;font-size:14px;line-height:1.3;}
.feat .fd{font-size:11px;color:var(--muted);line-height:1.3;}
.feat.locked{background:#f8fafc;opacity:.92;border-style:dashed;}
.feat .badge{position:absolute;top:8px;right:8px;font-size:15px;}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(5,10,25,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:18px;}
.modal{background:#fff;border-radius:20px;max-width:440px;width:100%;max-height:88vh;overflow-y:auto;padding:22px;}
.modal h2{margin:0 0 6px;font-size:20px;}

/* landing */
.hero{padding:40px 22px 24px;text-align:center;color:#fff;}
.hero .logo{font-size:46px;}
.hero h1{font-size:26px;margin:10px 0 4px;font-weight:900;letter-spacing:1px;}
.hero .subtitle{color:#9db4e8;font-size:14px;margin-bottom:6px;}
.hero .slogan{color:var(--cyan);font-size:16px;font-weight:700;margin:14px 0;}
.hero .desc{color:#c7d3ee;font-size:13px;line-height:1.8;margin:14px 0 22px;}
.value-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:14px;margin:10px 14px;color:#fff;}
.value-card h3{margin:0 0 6px;font-size:15px;color:var(--cyan);}
.value-card p{margin:0;font-size:12.5px;color:#c7d3ee;line-height:1.6;}

/* plan cards */
.plan{background:#fff;border-radius:16px;padding:18px;margin:12px 14px;border:2px solid var(--line);position:relative;}
.plan.featured{border-color:var(--blue);box-shadow:0 8px 24px rgba(37,99,235,.25);}
.plan .ribbon{position:absolute;top:-11px;left:50%;transform:translateX(-50%);background:var(--blue);color:#fff;font-size:11px;padding:3px 12px;border-radius:20px;font-weight:700;}
.plan h3{margin:0;font-size:20px;}
.plan .price{font-size:24px;font-weight:900;color:var(--blue);margin:6px 0;}
.plan .role{font-size:13px;color:var(--muted);margin-bottom:8px;}
.plan ul{margin:8px 0;padding-left:18px;font-size:13px;color:#334155;line-height:1.9;}

/* landing 商業版區塊 */
.hero-badge{display:inline-block;background:rgba(34,211,238,.15);color:var(--cyan);border:1px solid rgba(34,211,238,.4);
  font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;margin-bottom:14px;}
.hero h1.pain{font-size:27px;line-height:1.35;font-weight:900;margin:6px 12px 12px;}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:0 14px;}
.who-chip{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.18);color:#dbe6ff;
  font-size:13px;font-weight:700;padding:9px 14px;border-radius:30px;}
.who-chip .e{margin-right:5px;}
/* 戰情室預覽卡 */
.war-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.war-card{background:#fff;border-radius:14px;padding:14px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.war-card .wt{font-size:12px;color:var(--muted);font-weight:600;}
.war-card .wn{font-size:26px;font-weight:900;margin-top:4px;}
.war-card .we{position:absolute;top:10px;right:12px;font-size:20px;opacity:.85;}
.war-card.full{grid-column:1/3;display:flex;align-items:center;justify-content:space-between;}
.war-card.full .btn{width:auto;}
.war-card.bl{border-left:5px solid var(--blue);}
.war-card.gr{border-left:5px solid var(--green);}
.war-card.rd{border-left:5px solid var(--red);}
.war-card.yl{border-left:5px solid var(--yellow);}
/* 家長安心中心展示 */
.parent-demo{background:linear-gradient(135deg,#ffffff,#eef6ff);border-radius:16px;padding:18px;margin:12px 14px;box-shadow:var(--shadow);}
.parent-demo .pline{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px dashed var(--line);font-size:14px;}
.parent-demo .pline:last-child{border:none;}
.parent-demo .pe{font-size:20px;width:26px;text-align:center;}
/* 3 天體驗 流程列 */
.trial-day{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px dashed var(--line);}
.trial-day:last-of-type{border-bottom:none;}
.trial-day .td-badge{flex-shrink:0;width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--cyan));
  color:#fff;font-weight:900;display:flex;align-items:center;justify-content:center;font-size:15px;}
.trial-day b{font-size:14.5px;color:var(--navy);}
/* 體驗進度卡 */
.trial-progress{background:linear-gradient(135deg,var(--navy2),var(--blue));color:#fff;border-radius:var(--radius);padding:18px;margin:14px;box-shadow:var(--shadow);}
.trial-progress h3{margin:0 0 4px;font-size:17px;}
.trial-progress .tp-row{display:flex;align-items:center;gap:10px;padding:9px 0;font-size:14px;border-top:1px solid rgba(255,255,255,.15);}
.trial-progress .tp-row:first-of-type{border-top:none;}
.trial-progress .tp-ic{font-size:18px;width:24px;text-align:center;}
.trial-progress .tp-left{font-size:12px;background:rgba(255,255,255,.18);padding:4px 10px;border-radius:20px;font-weight:700;}
/* 任務卡 */
.task-row{display:flex;align-items:center;gap:11px;padding:12px 0;border-bottom:1px solid var(--line);}
.task-row:last-child{border-bottom:none;}
.task-row .tk-num{width:26px;height:26px;border-radius:50%;background:var(--card-soft);color:var(--blue);font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.task-row.done .tk-num{background:var(--green);color:#fff;}
.task-row .tk-txt{flex:1;font-size:14px;font-weight:600;color:var(--navy);}
.task-row .tk-txt.done{text-decoration:line-through;color:var(--muted);}
/* 優先關心名單 */
.care-row{border:1px solid var(--line);border-left:5px solid var(--red);border-radius:12px;padding:12px;margin:9px 0;}
.care-row.yl{border-left-color:var(--yellow);}
.care-row .cr-top{display:flex;justify-content:space-between;align-items:center;}
.care-row .cr-name{font-weight:800;font-size:15px;}
.care-row .cr-reason{font-size:12.5px;color:var(--muted);margin:4px 0 8px;}
.todo-line{font-size:14px;padding:8px 0;border-bottom:1px solid var(--line);color:var(--navy);}
.todo-line:last-child{border-bottom:none;}
.qa-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);gap:8px;}
.qa-row:last-child{border-bottom:none;}
.qa-row .qa-name{font-weight:600;font-size:14px;}
/* 為誰打造 卡片 */
.who-card{display:flex;align-items:flex-start;gap:13px;background:#fff;border-radius:14px;padding:15px;margin:10px 14px;box-shadow:var(--shadow);}
.who-card .we{font-size:28px;line-height:1.1;}
.who-card .wtxt b{display:block;font-size:15px;color:var(--navy);margin-bottom:3px;}
.who-card .wtxt span{font-size:12.5px;color:var(--muted);line-height:1.5;}
/* 家長通知範例卡 */
.notice-card{background:#fff;border-radius:16px;margin:12px 14px;box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--line);}
.notice-card .nhead{background:var(--card-soft);padding:11px 16px;font-weight:800;font-size:14px;color:var(--navy);border-bottom:1px solid var(--line);}
.notice-card .nbody{padding:16px;font-size:13.5px;line-height:1.8;white-space:pre-wrap;color:#334155;}
.plan .fit{font-size:12.5px;color:#475569;margin-bottom:6px;background:var(--card-soft);padding:6px 10px;border-radius:8px;}
/* 今日教練流程 */
.flow-step{display:flex;align-items:center;gap:11px;padding:12px 8px;border-bottom:1px solid var(--line);cursor:pointer;transition:.12s;border-radius:10px;}
.flow-step:last-child{border-bottom:none;}
.flow-step:active{background:var(--card-soft);}
.flow-step .fs-num{width:24px;height:24px;border-radius:50%;background:var(--blue);color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.flow-step .fs-ic{font-size:20px;}
.flow-step .fs-txt{flex:1;}
.flow-step .fs-txt b{display:block;font-size:14.5px;color:var(--navy);}
.flow-step .fs-txt span{font-size:12px;color:var(--muted);}
.flow-step .fs-go{font-size:22px;color:var(--muted);}
/* why 區塊 */
.why-card{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  border-radius:14px;padding:14px;margin:9px 14px;color:#fff;}
.why-card .we{font-size:26px;}
.why-card .wtxt b{display:block;font-size:14px;color:#fff;}
.why-card .wtxt span{font-size:12px;color:#9db4e8;}
.cta-band{background:linear-gradient(135deg,var(--blue),var(--cyan));margin:18px 14px;border-radius:18px;padding:22px;text-align:center;color:#fff;}
.cta-band h3{margin:0 0 4px;font-size:19px;}
.cta-band p{margin:0 0 14px;font-size:13px;opacity:.92;}

/* wizard */
.steps{display:flex;gap:6px;padding:14px 16px;}
.steps .dot{flex:1;height:6px;border-radius:6px;background:rgba(255,255,255,.2);}
.steps .dot.done{background:var(--cyan);}
.wizard-title{color:#fff;text-align:center;font-size:13px;margin-bottom:4px;}

/* stat */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0;}
.stat{background:var(--card-soft);border-radius:12px;padding:12px 6px;text-align:center;}
.stat .num{font-size:22px;font-weight:900;}
.stat .lbl{font-size:11px;color:var(--muted);}
.info-line{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px;}
.info-line:last-child{border:none;}
.info-line .k{color:var(--muted);}
.info-line .v{font-weight:700;}

.kpi-item{display:flex;align-items:center;gap:10px;margin:10px 0;}
.kpi-item .name{width:96px;font-size:14px;font-weight:600;}
.kpi-item input[type=range]{flex:1;}
.kpi-item .val{width:26px;text-align:center;font-weight:800;color:var(--blue);}

.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chip{padding:9px 14px;border-radius:20px;border:1.5px solid var(--line);background:#fff;font-size:14px;cursor:pointer;}
.chip.active{background:var(--blue);color:#fff;border-color:var(--blue);}

.report-item{border:1px solid var(--line);border-radius:12px;padding:12px;margin:8px 0;display:flex;justify-content:space-between;align-items:center;}
.light-dot{width:14px;height:14px;border-radius:50%;display:inline-block;}
.dot-green{background:var(--green-light);}
.dot-yellow{background:var(--yellow);}
.dot-red{background:var(--red);}

.copybox{background:#0f172a;color:#cbd5e1;border-radius:12px;padding:14px;font-size:12.5px;white-space:pre-wrap;line-height:1.7;font-family:"Consolas",monospace;margin:6px 0;}
.muted{color:var(--muted);font-size:13px;}
.center{text-align:center;}
hr.soft{border:none;border-top:1px solid var(--line);margin:14px 0;}
.pill-plan{font-size:12px;padding:4px 10px;border-radius:20px;background:#dbeafe;color:#1e40af;font-weight:700;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:12px 22px;border-radius:30px;font-size:14px;z-index:200;box-shadow:0 6px 20px rgba(0,0,0,.4);}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div id="modal-root"></div>
<div id="toast-root"></div>

<script>
/* ==================================================================
   【1】資料結構 DATA STRUCTURE
   - 使用 localStorage 模擬後端
   - 預留 Google Sheet / Firebase / LINE 串接結構（adapter 留位）
   ================================================================== */
const DB_KEYS = {
  account:'teampro_account',     // 帳號 + 單位 + 團隊 + 運動 + 方案 (teamData)
  reports:'teampro_daily_reports', // 每日回報陣列 (dailyReports)
  session:'teampro_session',     // 是否登入
  trial:'teampro_trial',         // 3 天體驗狀態 (trialData)
  notices:'teampro_parent_notices' // 已產生的家長通知 (parentNotices)
};

// 預留：未來資料同步介面（目前只走 localStorage）
const StorageAdapter = {
  save(key,val){ localStorage.setItem(key, JSON.stringify(val)); /* TODO: Firebase / Google Sheet 同步 */ },
  load(key,def){ try{ return JSON.parse(localStorage.getItem(key)) ?? def; }catch(e){ return def; } },
  remove(key){ localStorage.removeItem(key); }
};

// 預留：LINE 推播介面（目前用「複製文字」模擬）
const LineAdapter = {
  push(text){ /* TODO: 串接 LINE Messaging API；目前由使用者複製貼上 */ return false; }
};

/* ==================================================================
   【1.3】線上回報後端 API（Google Apps Script Web App）
   - 教練啟用後分享連結，選手用自己手機回報，教練後台看誰沒回報
   - GAS /exec 網址：優先用網址帶的 ?api=，其次 localStorage，其次內建常數
   ================================================================== */
const GAS_API_DEFAULT = 'https://script.google.com/macros/s/AKfycbwpFq4icljhRzn8Ccm7Ji5BEAxN-4Hdsl5oE8DJAS0ihKLsQBx3jsNf2VVcINOFBtzRtg/exec'; // 已內建後端網址
function getApiUrl(){
  const u=new URLSearchParams(location.search).get('api');
  if(u) return decodeURIComponent(u);
  return localStorage.getItem('teampro_api') || GAS_API_DEFAULT || '';
}
// GET 讀取（回傳 Promise<JSON>）
function apiGet(params){
  const base=getApiUrl();
  if(!base) return Promise.reject('尚未設定後端網址');
  const qs=Object.keys(params).map(k=>k+'='+encodeURIComponent(params[k])).join('&');
  return fetch(base+'?'+qs).then(r=>r.json());
}
// POST 寫入（用 text/plain 避免 GAS CORS 預檢）
function apiPost(payload){
  const base=getApiUrl();
  if(!base) return Promise.reject('尚未設定後端網址');
  return fetch(base,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify(payload)}).then(r=>r.json());
}

let ACCOUNT = StorageAdapter.load(DB_KEYS.account, null);
let REPORTS = StorageAdapter.load(DB_KEYS.reports, []);
let NOTICES = StorageAdapter.load(DB_KEYS.notices, []);
let ROSTER  = StorageAdapter.load('teampro_roster', []); // 選手名單（陣列：姓名）

/* ==================================================================
   【1.5】trialMode 3 天教練戰情室體驗
   trialData: { active, startDate, endDate, progress:{day1,day2,day3} }
   trialDay(): day1 / day2 / day3 / expired（依實際經過天數計算）
   ================================================================== */
let TRIAL = StorageAdapter.load(DB_KEYS.trial, null);

// 體驗期間開放的功能
const TRIAL_FEATURES = ['daily_checkin','kpi_score','body_status','nutrition_record',
  'traffic_light','line_copy','data_save','coach_dashboard','parent_notice',
  'roster_management','student_history','trial_report'];
// 體驗到期後仍可使用（含 3 日體驗報告查看）
const TRIAL_EXPIRED_KEEP = ['daily_checkin','kpi_score','body_status','nutrition_record',
  'traffic_light','data_save','trial_report'];

function startTrial(){
  const now=new Date();
  const end=new Date(now.getTime()+3*864e5);
  TRIAL={ active:true, startDate:now.toISOString(), endDate:end.toISOString(),
    progress:{day1:false,day2:false,day3:false} };
  StorageAdapter.save(DB_KEYS.trial,TRIAL);
}
// 依經過天數判定目前體驗階段
function trialDay(){
  if(!TRIAL||!TRIAL.active) return null;
  const elapsed=(Date.now()-new Date(TRIAL.startDate).getTime())/864e5;
  if(elapsed>=3) return 'expired';
  if(elapsed>=2) return 'day3';
  if(elapsed>=1) return 'day2';
  return 'day1';
}
function trialDaysLeft(){
  if(!TRIAL||!TRIAL.active) return 0;
  return Math.max(0,Math.ceil((new Date(TRIAL.endDate).getTime()-Date.now())/864e5));
}
function setTrialProgress(k){
  if(!TRIAL) return;
  if(!TRIAL.progress[k]){ TRIAL.progress[k]=true; StorageAdapter.save(DB_KEYS.trial,TRIAL); }
}

/* ==================================================================
   【2】權限設定 PERMISSIONS
   ================================================================== */

// 核心：是否擁有某功能（含 3 天體驗模式判斷）
function hasFeature(featureKey){
  const need = featurePermissions[featureKey];
  if(!need) return false;
  // 體驗模式
  if(TRIAL && TRIAL.active){
    const day=trialDay();
    if(day==='expired'){
      if(TRIAL_EXPIRED_KEEP.includes(featureKey)) return true;
      // 到期後其餘功能回歸方案判斷（多半鎖定）
    }else{
      if(TRIAL_FEATURES.includes(featureKey)) return true;
    }
  }
  // 一般方案判斷
  return PLAN_RANK[currentPlan()] >= PLAN_RANK[need];
}

function toast(msg){
  const r=document.getElementById('toast-root');
  r.innerHTML=`<div class="toast">${msg}</div>`;
  setTimeout(()=>r.innerHTML='',1800);
}
function closeModal(){ document.getElementById('modal-root').innerHTML=''; }
function showModal(html){
  document.getElementById('modal-root').innerHTML=
    `<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;
}
function go(page,arg){ render(page,arg); window.scrollTo(0,0); }

   【4】UI 渲染 ROUTER
   ================================================================== */
let CURRENT='landing';
function render(page,arg){
  CURRENT=page||CURRENT;
  const app=document.getElementById('app');
  // 登入後頁面
  const loggedPages=['dashboard','checkin','records','coach','reports','settings'];
  if(loggedPages.includes(CURRENT) && !StorageAdapter.load(DB_KEYS.session,false)){
    CURRENT='landing';
  }
  switch(CURRENT){
    case 'landing': app.innerHTML=Landing(); break;
    case 'login': app.innerHTML=LoginPage(); break;
    case 'wizard': app.innerHTML=Wizard(); break;
    case 'dashboard': app.innerHTML=Dashboard()+BottomNav('dashboard'); break;
    case 'checkin': app.innerHTML=CheckinPage()+BottomNav('checkin'); bindCheckin(); break;
    case 'records': app.innerHTML=RecordsPage()+BottomNav('records'); break;
    case 'coach': app.innerHTML=CoachPage()+BottomNav('coach'); break;
    case 'reports': app.innerHTML=ReportsPage()+BottomNav('reports'); break;
    case 'settings': app.innerHTML=SettingsPage()+BottomNav('settings'); break;
    default: app.innerHTML=Landing();
  }
}

// 產生示範回報資料，讓戰情室/報告有內容
function seedDemoReports(){
  const names=['陳小宇','王小明','林佳螢','張志豪','李宥蓁'];
  const today=new Date();
  const demo=[];
  names.forEach((n,idx)=>{
    for(let d=0; d<3; d++){
      const date=new Date(today-d*864e5).toISOString().slice(0,10);
      const base=3+ (idx%3) - d*0.2 + (n==='王小明'?-1.2:0);
      const kpis=getKpiTemplate(); const scores={};
      kpis.forEach(k=>scores[k]=Math.max(1,Math.min(5,Math.round(base+(Math.random()*1.4-0.7)))));
      const vals=Object.values(scores); const total=vals.reduce((a,b)=>a+b,0); const avg=+(total/vals.length).toFixed(2);
      let hi=kpis[0],lo=kpis[0]; kpis.forEach(k=>{if(scores[k]>scores[hi])hi=k; if(scores[k]<scores[lo])lo=k;});
      const fatigue=n==='王小明'?5:(2+ (d%3));
      const sleep=n==='王小明'?5.5:7;
      const injury=(n==='張志豪'&&d===0)?'是':'否';
      let light=avg>=4?'green':avg>=3?'yellow':'red';
      if((fatigue===5||injury==='是'||sleep<6)&&light==='green')light='yellow';
      demo.push({reportId:'D'+Date.now()+idx+''+d+Math.floor(Math.random()*999),teamId:ACCOUNT.teamName,date,studentName:n,
        attendanceStatus:'正常出席',bodyStatus:n==='王小明'?'疲勞':'很好',sleepHours:sleep,fatigueLevel:fatigue,
        injuryStatus:injury,injuryPart:injury==='是'?'腳踝':'',breakfast:'三明治',lunch:'便當',dinner:'家常菜',
        waterAmount:n==='王小明'?'800ml':'2000ml',nightSnack:'否',kpiScores:scores,kpiAverage:avg,kpiTotal:total,
        highestKpi:hi,lowestKpi:lo,trafficLight:light,studentReflection:'今天很努力',tomorrowGoal:'加強基本動作',
        createdAt:new Date(today-d*864e5).toISOString()});
    }
  });
  REPORTS=demo;
  StorageAdapter.save(DB_KEYS.reports,REPORTS);
}

/* ===== 統計工具：戰情室即時數字 ===== */
function waterMl(str){ const m=String(str||'').match(/\d+/); return m?parseInt(m[0]):0; }
function computeStats(dateStr){
  const date=dateStr||new Date().toISOString().slice(0,10);
  const todayR=REPORTS.filter(r=>r.date===date);
  const allNames=[...new Set(REPORTS.map(r=>r.studentName))];
  const filledToday=[...new Set(todayR.map(r=>r.studentName))];
  return {
    date, todayR, allNames, filledToday,
    reported:filledToday.length,
    notReported:Math.max(0,allNames.length-filledToday.length),
    green:todayR.filter(r=>r.trafficLight==='green').length,
    yellow:todayR.filter(r=>r.trafficLight==='yellow').length,
    red:todayR.filter(r=>r.trafficLight==='red').length,
    injured:todayR.filter(r=>r.injuryStatus==='是').length,
    lowSleep:todayR.filter(r=>r.sleepHours<6).length,
    lowWater:todayR.filter(r=>waterMl(r.waterAmount)<1500).length
  };
}
// 只取「完整回報」（有 KPI 的，排除快速點名的最小紀錄）
function fullReports(){ return REPORTS.filter(r=>r.kpiScores && Object.keys(r.kpiScores).length); }
function groupByName(list){ const g={}; (list||fullReports()).forEach(r=>{(g[r.studentName]=g[r.studentName]||[]).push(r);});
  Object.keys(g).forEach(n=>g[n].sort((a,b)=>new Date(b.date)-new Date(a.date))); return g; }

/* 今日優先關心名單（含原因判斷） */
function careList(){
  const byName=groupByName();
  const out=[];
  Object.keys(byName).forEach(n=>{
    const list=byName[n];
    const r=list[0];
    const reasons=[];
    if(r.injuryStatus==='是') reasons.push('受傷中');
    if(r.sleepHours<6) reasons.push('睡眠不足');
    if(r.fatigueLevel>=4) reasons.push('疲勞偏高');
    if(waterMl(r.waterAmount)<1500) reasons.push('水量不足');
    if(list.length>=2 && list[0].kpiAverage<list[1].kpiAverage &&
       (list.length<3 || list[1].kpiAverage<=list[2].kpiAverage)) reasons.push('KPI 連續下降');
    if(r.trafficLight==='red' && reasons.length===0) reasons.push('整體狀態紅燈');
    if(reasons.length){
      const sev=(r.trafficLight==='red'?3:0)+(r.injuryStatus==='是'?2:0)+reasons.length;
      out.push({name:n, light:r.light||r.trafficLight, reason:reasons.join('＋'), reportId:r.reportId, sev});
    }
  });
  return out.sort((a,b)=>b.sev-a.sev);
}
/* 今日出席統計 */
function attendanceSummary(dateStr){
  const date=dateStr||new Date().toISOString().slice(0,10);
  const todayR=REPORTS.filter(r=>r.date===date);
  return {
    present:todayR.filter(r=>r.attendanceStatus==='正常出席').length,
    leave:todayR.filter(r=>r.attendanceStatus==='請假').length,
    late:todayR.filter(r=>r.attendanceStatus==='遲到').length,
    early:todayR.filter(r=>r.attendanceStatus==='早退').length,
    issues:todayR.filter(r=>r.attendanceStatus && r.attendanceStatus!=='正常出席')
  };
}
/* 狀態下滑學生（最近 KPI 低於前一次） */
function decliningStudents(){
  const g=groupByName(); const out=[];
  Object.keys(g).forEach(n=>{ const l=g[n];
    if(l.length>=2 && l[0].kpiAverage<l[1].kpiAverage)
      out.push({name:n, drop:+(l[1].kpiAverage-l[0].kpiAverage).toFixed(1), now:l[0].kpiAverage, reportId:l[0].reportId});
  });
  return out.sort((a,b)=>b.drop-a.drop);
}
/* 本週進步學生（最近 KPI 高於前一次） */
function improvingStudents(){
  const g=groupByName(); const out=[];
  Object.keys(g).forEach(n=>{ const l=g[n];
    if(l.length>=2 && l[0].kpiAverage>l[1].kpiAverage)
      out.push({name:n, up:+(l[0].kpiAverage-l[1].kpiAverage).toFixed(1), now:l[0].kpiAverage, reportId:l[0].reportId});
  });
  return out.sort((a,b)=>b.up-a.up);
}
/* 今日教練待辦 */
function todayTodos(){
  const s=computeStats(); const att=attendanceSummary(); const cares=careList();
  const todos=[];
  if(s.notReported>0) todos.push(`提醒 ${s.notReported} 位學生完成今日回報`);
  if(att.late+att.leave+att.early>0) todos.push(`追蹤 ${att.late} 位遲到、${att.leave} 位請假、${att.early} 位早退`);
  if(s.red>0) todos.push(`個別關心 ${s.red} 位紅燈學生`);
  if(s.injured>0) todos.push(`留意 ${s.injured} 位受傷學生的訓練量`);
  if(cares.length) todos.push(`為 ${cares.length} 位需關心學生產生家長通知`);
  if(todos.length===0) todos.push('今日狀態良好，給選手一句鼓勵吧！');
  return todos;
}

/* ===== 載入示範校隊資料（10 位學生 × 最近 3 天）===== */
function loadDemoTeam(){
  const names=['王小明','李小華','陳小宇','張小安','林小偉','黃小婷','劉小杰','蔡小妤','許小恩','鄭小豪'];
  const kpis=getKpiTemplate();
  const today=new Date();
  const data=[];
  names.forEach((n,idx)=>{
    for(let d=2; d>=0; d--){
      const date=new Date(today-d*864e5).toISOString().slice(0,10);
      // 設計幾位有問題的學生，讓戰情室有完整效果
      let base=3.6 + (idx%4)*0.3 - d*0.1;
      if(n==='王小明') base=2.6 - d*0.1;          // 連續下降 + 睡眠不足
      if(n==='李小華') base=4.2 - d*0.5;          // KPI 連續下降
      if(n==='陳小宇') base=4.4 + d*0.05;         // 穩定優秀（進步最多）
      const scores={};
      kpis.forEach(k=>scores[k]=Math.max(1,Math.min(5,Math.round(base+(Math.random()*1-0.5)))));
      const vals=Object.values(scores); const total=vals.reduce((a,b)=>a+b,0); const avg=+(total/vals.length).toFixed(2);
      let hi=kpis[0],lo=kpis[0]; kpis.forEach(k=>{if(scores[k]>scores[hi])hi=k; if(scores[k]<scores[lo])lo=k;});
      const sleep = n==='王小明'?5.5 : (n==='黃小婷'?5 : (idx%5===0?6.5:7.5));
      const fatigue = n==='王小明'?5 : (n==='劉小杰'?4 : (1+ (idx%4)));
      const injury = (n==='陳小宇'&&false) || (n==='許小恩'&&d===0)?'是':'否';
      const water = (n==='李小華'||n==='鄭小豪'||idx%3===0)?'1000ml':'2000ml';
      const body = injury==='是'?'受傷中':(fatigue>=4?'疲勞':(avg>=4?'很好':'普通'));
      const att = (n==='蔡小妤'&&d===0)?'請假':'正常出席';
      let light = avg>=4?'green':avg>=3?'yellow':'red';

// type: positive 正向鼓勵 / improve 提醒改善 / trial 三天體驗成果
function buildParentNotice(r,reason,type){
  const team=ACCOUNT?ACCOUNT.teamName:'本隊';
  const sign=`\n\n— ${team} 教練團隊（由 TeamPro 協助整理）`;
  if(type==='positive'){
    return `親愛的家長您好：

今天 ${r.studentName} 在訓練中表現很棒！👏
本日狀態：${lightEmoji(r.trafficLight)} 整體穩定
亮點：${r.highestKpi||'專注與態度'}有明顯表現，訓練態度認真。

孩子正一步步進步，謝謝您在家的支持與陪伴。
我們會持續陪著孩子一起成長。${sign}`;
  }
  if(type==='trial'){
    const g=groupByName()[r.studentName]||[r];
    const avg=(g.reduce((s,x)=>s+(x.kpiAverage||0),0)/g.length).toFixed(1);
    return `親愛的家長您好：

這是 ${r.studentName} 最近三天的訓練回顧 📋
・出席：${g.length} 次訓練紀錄
・平均表現：KPI ${avg}（滿分 5）
・最佳項目：${r.highestKpi||'—'}
・可加強：${r.lowestKpi||'—'}

孩子的每一次努力，我們都有看見並記錄下來。
若想了解完整成長報告，歡迎與教練聯繫。${sign}`;
  }
  // improve 提醒改善版（預設）
  return `【孩子今日訓練狀態】

孩子：${r.studentName}
今日狀態：${trafficText(r.trafficLight)}

今天系統提醒：
${reason||'整體狀態良好，請持續鼓勵。'}

教練提醒：
今天有完成訓練，但狀態需要稍微調整。建議今晚提早休息，明天訓練前補充早餐與水分。

回家建議：
請協助孩子早點休息，避免含糖飲料與宵夜，明天訓練前記得補充早餐與水分。${sign}`;
}

/* ---------------- 每日回報：計算 + 儲存 ---------------- */
function submitCheckin(){
  const name=val('c-name');
  if(!name){ toast('請輸入學生姓名'); return; }
  // 收集 KPI
  const kpiScores={};
  document.querySelectorAll('#kpi-box input[type=range]').forEach(r=>{
    kpiScores[r.dataset.kpi]=parseInt(r.value);
  });
  const vals=Object.values(kpiScores);
  const total=vals.reduce((a,b)=>a+b,0);
  const avg=+(total/vals.length).toFixed(2);
  // 最高/最低項
  let hi=Object.keys(kpiScores)[0],lo=Object.keys(kpiScores)[0];
  Object.keys(kpiScores).forEach(k=>{ if(kpiScores[k]>kpiScores[hi])hi=k; if(kpiScores[k]<kpiScores[lo])lo=k; });

  const sleep=parseFloat(val('c-sleep'))||0;
  const fatigue=parseInt(val('c-fatigue'))||1;
  const body=val('c-body');
  const injury=val('c-injury');

  // 紅黃綠燈判斷
  let light = avg>=4 ? 'green' : (avg>=3 ? 'yellow' : 'red');
  // 安全規則：疲勞5/受傷中/睡眠<6 至少黃燈
  if((fatigue===5 || body==='受傷中' || injury==='是' || sleep<6) && light==='green') light='yellow';

  const report={
    reportId:'R'+Date.now(),
    teamId:ACCOUNT.teamName,
    date:val('c-date'),
    studentName:name,
    attendanceStatus:val('c-att'),
    bodyStatus:body,
    sleepHours:sleep,
    fatigueLevel:fatigue,
    injuryStatus:injury,
    injuryPart:val('c-injpart'),
    breakfast:val('c-bf'),
    lunch:val('c-lunch'),
    dinner:val('c-dinner'),
    waterAmount:val('c-water'),
    nightSnack:val('c-snack'),
    kpiScores,
    kpiAverage:avg,
    kpiTotal:total,
    highestKpi:hi,
    lowestKpi:lo,
    trafficLight:light,
    studentReflection:val('c-reflect'),
    tomorrowGoal:val('c-goal'),
    createdAt:new Date().toISOString()
  };
  REPORTS.unshift(report);
  StorageAdapter.save(DB_KEYS.reports,REPORTS);
  toast('✅ 打卡完成！');
  showResultModal(report);
}

function buildLineText(r,type){
  const team=ACCOUNT.teamName;
  const foodTip = (r.nightSnack==='是'?'注意宵夜攝取；':'') + (r.waterAmount?('水量 '+r.waterAmount):'水分補充充足');
  if(type==='coach'){
    return `【TeamPro 今日訓練回報】
團隊：${team}
選手：${r.studentName}
日期：${r.date}
出席：${r.attendanceStatus}
今日 KPI：${r.kpiAverage}（總分 ${r.kpiTotal}）
狀態燈號：${lightEmoji(r.trafficLight)} ${trafficText(r.trafficLight)}
身體狀態：${r.bodyStatus}
睡眠：${r.sleepHours} 小時
疲勞：${r.fatigueLevel}/5
飲食提醒：${foodTip}
今日心得：${r.studentReflection||'-'}
明日目標：${r.tomorrowGoal||'-'}`;
  }
  if(type==='parent'){
    const tip = r.trafficLight==='red'?'今日狀態需要多關心，建議充足休息。':
                r.trafficLight==='yellow'?'今日狀態尚可，請留意作息與飲食。':'今日狀態良好，請持續鼓勵！';
    return `【孩子今日訓練狀態】

今日狀態：${lightEmoji(r.trafficLight)} ${trafficText(r.trafficLight)}
今日努力亮點：${r.highestKpi}（${r.kpiScores[r.highestKpi]} 分）
教練提醒：${tip}
回家建議：${r.sleepHours<7?'早點休息，補足睡眠；':''}均衡飲食、充足水分。`;
  }
  // player
  return `【我的今日訓練紀錄】
今日 KPI：${r.kpiAverage}（總分 ${r.kpiTotal}）
我最好的項目：${r.highestKpi}（${r.kpiScores[r.highestKpi]} 分）
我需要加強：${r.lowestKpi}（${r.kpiScores[r.lowestKpi]} 分）
明日目標：${r.tomorrowGoal||'繼續努力！'}`;
}

function copyText(t,msg){
  const ok=msg||'📋 已複製到剪貼簿';
  navigator.clipboard?.writeText(t).then(()=>toast(ok),()=>fallbackCopy(t,ok));
  if(!navigator.clipboard) fallbackCopy(t,ok);
}
function fallbackCopy(t,msg){
  const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);
  ta.select();try{document.execCommand('copy');toast(msg||'📋 已複製');}catch(e){toast('複製失敗，請手動選取');}
  document.body.removeChild(ta);
}

function TrialReportBlock(){
  // 取最近 3 天資料
  const now=new Date();
  const days=[0,1,2].map(d=>new Date(now-d*864e5).toISOString().slice(0,10));
  const rs=REPORTS.filter(r=>days.includes(r.date));
  const total=rs.length;
  const green=rs.filter(r=>r.trafficLight==='green').length;
  const yellow=rs.filter(r=>r.trafficLight==='yellow').length;
  const red=rs.filter(r=>r.trafficLight==='red').length;
  const lowSleep=rs.filter(r=>r.sleepHours<6).length;
  const highFatigue=rs.filter(r=>r.fatigueLevel>=4).length;
  const injured=rs.filter(r=>r.injuryStatus==='是').length;
  const lowWater=rs.filter(r=>waterMl(r.waterAmount)<1500).length;
  const noticeCount=NOTICES.length;
  const careCount=careList().length;
  // 平均回報率（以示範 10 人 × 3 天估算，或實際學生數）
  const studentCount=Math.max(1,[...new Set(REPORTS.map(r=>r.studentName))].length);
  const rate=Math.min(100,Math.round(total/(studentCount*3)*100));
  // 最穩定 / 最需關懷
  const byName={};
  rs.forEach(r=>{ (byName[r.studentName]=byName[r.studentName]||[]).push(r); });
  let stable='-',stableAvg=-1, worst='-',worstAvg=99;
  Object.keys(byName).forEach(n=>{
    const a=byName[n].reduce((s,r)=>s+r.kpiAverage,0)/byName[n].length;
    if(a>stableAvg){stableAvg=a;stable=n;}
    if(a<worstAvg){worstAvg=a;worst=n;}
  });
  const cares=careList();
  if(cares.length) worst=cares[0].name;
  const improved=improvingStudents();
  // 省時估算
  const savedMinutes=total*1 + noticeCount*3 + (red+yellow)*2;

    <button class="btn outline" onclick="exportCSV()">匯出回報紀錄 CSV</button>
  </div>
  <div style="height:30px"></div>`;

function personalTrend(){
  if(!hasFeature('personal_trend')) return `<p class="muted">🔒 升級 Team 後可看個人趨勢圖。</p>`;
  // 取每位選手最近紀錄做簡易長條
  const byName={};
  REPORTS.forEach(r=>{ (byName[r.studentName]=byName[r.studentName]||[]).push(r); });
  const names=Object.keys(byName).slice(0,5);
  if(names.length===0) return `<p class="muted">尚無資料</p>`;
  return names.map(n=>{
    const list=byName[n].slice(0,7).reverse();
    const bars=list.map(r=>{
      const h=r.kpiAverage/5*60;
      const c=r.trafficLight==='green'?'var(--green-light)':r.trafficLight==='yellow'?'var(--yellow)':'var(--red)';
      return `<div title="${r.date}:${r.kpiAverage}" style="width:18px;height:${h}px;background:${c};border-radius:4px 4px 0 0"></div>`;
    }).join('');
    return `<div style="margin:10px 0"><b style="font-size:14px">${n}</b>
      <div style="display:flex;align-items:flex-end;gap:6px;height:64px;margin-top:6px;border-bottom:1px solid var(--line)">${bars}</div></div>`;
  }).join('');
}
function exportCSV(){
  if(REPORTS.length===0){toast('沒有資料可匯出');return;}
  const headers=['date','studentName','attendanceStatus','bodyStatus','sleepHours','fatigueLevel','kpiAverage','kpiTotal','trafficLight'];
  const rows=REPORTS.map(r=>headers.map(h=>`"${r[h]??''}"`).join(','));
  const csv='﻿'+headers.join(',')+'\n'+rows.join('\n');
  downloadFile(csv,'teampro_reports.csv','text/csv');
  toast('📤 已匯出 CSV');
}

function exportJSON(){

function importJSON(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.account){ACCOUNT=d.account;StorageAdapter.save(DB_KEYS.account,ACCOUNT);}
      if(d.reports){REPORTS=d.reports;StorageAdapter.save(DB_KEYS.reports,REPORTS);}
      if(d.trial){TRIAL=d.trial;StorageAdapter.save(DB_KEYS.trial,TRIAL);}
      if(d.notices){NOTICES=d.notices;StorageAdapter.save(DB_KEYS.notices,NOTICES);}
      toast('📥 匯入成功');render('settings');
    }catch(err){toast('❌ 檔案格式錯誤');}
  };
  reader.readAsText(file);
}

function simulateExpire(){
  if(!TRIAL){ startTrial(); }

  TRIAL.startDate=back.toISOString();
  TRIAL.endDate=new Date(back.getTime()+3*864e5).toISOString();

  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

  const url=location.origin+location.pathname;

function stuSubmit(){
  const self=parseInt(val('st-self'))||3;
  const sleep=parseFloat(val('st-sleep'))||0;
  const fat=parseInt(val('st-fat'))||1;
  const body=val('st-body'); const inj=val('st-inj'); const water=val('st-water');
  let light=self>=4?'green':self>=3?'yellow':'red';
  if((fat===5||body==='受傷中'||inj==='是'||sleep<6)&&light==='green') light='yellow';
  const payload={action:'submitReport',teamCode:STU.team,date:new Date().toISOString().slice(0,10),
    studentName:STU.name,attendance:val('st-att'),body,sleep,fatigue:fat,injury:inj,injuryPart:'',
    water,kpiAvg:self,light,note:val('st-note')};
  stuShell('<div class="card center"><p class="muted">送出中…</p></div>');
  apiPost(payload).then(res=>{
    if(res&&res.ok){
      stuShell(`<div class="card center"><div style="font-size:46px">${lightEmoji(light)}</div>
        <h2>回報完成！</h2><p class="muted">謝謝 ${STU.name}，教練已經收到你今天的狀態 👍</p>
        <button class="btn" onclick="stuPickName()">幫其他人回報</button></div>`);
    } else stuShell('<div class="card center"><p class="muted">送出失敗，請稍後再試。</p><button class="btn" onclick="stuForm(STU.roster.indexOf(STU.name))">重試</button></div>');
  }).catch(e=>stuShell('<div class="card center"><p class="muted">連線失敗：'+e+'</p></div>'));
}

/* ==================================================================
   【家長端】?mode=parent&team=代碼  → 選孩子 → 看最近狀態（唯讀）
   ================================================================== */
const PAR={team:null,roster:[],teamName:''};
function ParentApp(team){
  if(!team){ document.getElementById('app').innerHTML='<div class="card center" style="margin-top:40px">連結無效</div>'; return; }
  PAR.team=team;
  document.getElementById('app').innerHTML='<div class="card center" style="margin-top:40px"><p class="muted">載入中…</p></div>';
  apiGet({action:'getRoster',team}).then(res=>{
    if(!res||!res.ok||!res.students.length){ document.getElementById('app').innerHTML='<div class="card center" style="margin-top:40px"><p class="muted">查無資料</p></div>'; return; }
    PAR.roster=res.students; PAR.teamName=res.teamName||'';
    parPick();
  }).catch(e=>{document.getElementById('app').innerHTML='<div class="card center" style="margin-top:40px"><p class="muted">連線失敗：'+e+'</p></div>';});
}
function parShell(inner){
  document.getElementById('app').innerHTML=`
  <div class="hero" style="padding:26px 18px 10px">
    <div class="hero-badge">👪 家長安心中心</div>
    <h1 style="font-size:22px;margin:8px 0 2px">${PAR.teamName||'TeamPro'}</h1>
    <div class="subtitle">看看孩子最近的訓練狀態</div>
  </div>${inner}`;
}
function parPick(){
  parShell(`<div class="card"><b>請選擇您的孩子</b>
    <div class="chips" style="margin-top:10px">${PAR.roster.map(n=>`<span class="chip" onclick="parView('${n}')">${n}</span>`).join('')}</div>
  </div>`);
}
function parView(name){
  parShell('<div class="card center"><p class="muted">載入中…</p></div>');
  apiGet({action:'getStudent',team:PAR.team,name}).then(res=>{
    const list=(res&&res.reports)||[];
    const latest=list[0];
    parShell(`<div class="card">
      <h2 style="margin:0 0 4px">${name}</h2>
      ${latest?`<div class="info-line"><span class="k">最新狀態</span><span class="v">${lightEmoji(latest.light)} ${latest.light==='none'?'已回報':trafficText(latest.light)}</span></div>
        <div class="info-line"><span class="k">日期</span><span class="v">${latest.date}</span></div>
        <div class="info-line"><span class="k">出席</span><span class="v">${latest.attendance||'-'}</span></div>
        <div class="info-line"><span class="k">身體/睡眠</span><span class="v">${latest.body||'-'} / ${latest.sleep||'-'}h</span></div>
        <div class="info-line"><span class="k">教練/孩子留言</span><span class="v">${latest.note||'-'}</span></div>`
        :'<p class="muted">孩子最近還沒有回報紀錄。</p>'}
    </div>
    <div class="section-title" style="font-size:14px">📅 最近紀錄</div>
    <div class="card">
      ${list.length?list.map(r=>`<div class="report-item"><div><b>${r.date}</b> ${lightDot(r.light)}<div class="muted">${r.attendance||''} · 睡眠 ${r.sleep||'-'}h</div></div>
        <span class="tag ${r.light==='green'?'green':r.light==='yellow'?'yellow':r.light==='red'?'red':'gray'}">${r.light==='none'?'已回報':trafficText(r.light)}</span></div>`).join(''):'<p class="muted">尚無紀錄</p>'}
    </div>
    <button class="btn outline" style="margin:0 14px" onclick="parPick()">← 看其他孩子</button>
    <div style="height:30px"></div>`);
  }).catch(e=>parShell('<div class="card center"><p class="muted">連線失敗：'+e+'</p></div>'));
}

/* ==================================================================
   啟動：先判斷網址模式（選手回報 / 家長查閱），否則進教練系統
   ================================================================== */
(function init(){
  const q=new URLSearchParams(location.search);
  const mode=q.get('mode');
  if(mode==='student'){ StudentApp(q.get('team')); return; }
  if(mode==='parent'){ ParentApp(q.get('team')); return; }
  const logged=StorageAdapter.load(DB_KEYS.session,false);
  if(logged && ACCOUNT){ render('dashboard'); }
  else { render('landing'); }
})();
</script>
</body>
</html>
